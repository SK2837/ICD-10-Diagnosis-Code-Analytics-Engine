name: 'icd10_analytics'
version: '1.0.0'

profile: 'icd10_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# dbt variables — override at runtime with --vars
vars:
  risk_tier_low: 0.5
  risk_tier_medium: 1.5
  risk_tier_high: 3.0
  high_cost_percentile: 0.90

models:
  icd10_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
